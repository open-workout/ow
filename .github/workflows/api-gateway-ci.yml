name: API Gateway CI
on:
  push:
    paths:
      - "services/api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"
  pull_request:
    paths:
      - "services/api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('services/api-gateway/go.sum') }}
      - name: Install dependencies
        working-directory: services/api-gateway
        run: go mod download
      - name: Run tests
        working-directory: services/api-gateway
        run: go test ./... -v
