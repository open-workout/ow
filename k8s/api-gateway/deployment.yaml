apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ow
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: ow-secrets
                  key: AUTH0_DOMAIN
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: ow-secrets
                  key: AUTH0_AUDIENCE
            - name: USER_SERVICE_URL
              value: http://user-service:8081
            - name: EXERCISE_SERVICE_URL
              value: http://exercise-service:8083
            - name: WORKOUT_SERVICE_URL
              value: http://workout-service:8082
            - name: RATE_LIMIT_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
