apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ow
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service
          ports:
            - containerPort: 8081
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: ow-secrets
                  key: POSTGRES_DSN_USER
            - name: USER_SERVICE_PORT
              value: "8081"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
